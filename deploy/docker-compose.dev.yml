name: custom-rag-dev

# Local dev stack: Qdrant (vectors) + Keycloak (OIDC, for JWT against query/ingest).
# Usage (from repo root):
#   docker compose -f deploy/docker-compose.dev.yml up -d
#   docker compose -f deploy/docker-compose.dev.yml down
#
# Go services default Qdrant to localhost:6334 — matches published ports below.
# Keycloak admin UI: http://localhost:8090  (admin / see KEYCLOAK_ADMIN_PASSWORD)
# OIDC issuer (master realm): http://localhost:8090/realms/master
# Create a dedicated realm (e.g. rag) and clients per design spec when wiring OIDC.

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: custom-rag-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: custom-rag-keycloak
    command: start-dev
    ports:
      # Host 8090 avoids clashing with the Go query service on host :8080
      - "8090:8080"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    volumes:
      - keycloak_data:/opt/keycloak/data
    restart: unless-stopped

volumes:
  qdrant_data:
  keycloak_data:
